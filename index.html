<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שומר שמיים — Sky Shield</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); init(); render(); });
resize();

// ── Constants ────────────────────────────────────────────────────────────────
const GROUND_H  = 100;
const BATTERY_W = 72;
const BATTERY_H = 52;

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  wave: 1, score: 0, energy: 20, maxEnergy: 20,
  selectedSystem: 0, phase: 'playing',
  cities: [], threats: [], interceptors: [], explosions: [], systems: [],
};

// ── Systems ──────────────────────────────────────────────────────────────────
function makeSystems(W, H) {
  const groundY = H - GROUND_H;
  const gap = 14;
  const base = W - gap - BATTERY_W;
  return [
    { name:'כיפת ברזל', range:0.33, reloadTime:0.8,  currentReload:0, energyCost:1, level:'low',      color:'#00e5ff', key:'1', x: base - 0*(BATTERY_W+gap), y: groundY - BATTERY_H },
    { name:'קלע דוד',   range:0.66, reloadTime:2,    currentReload:0, energyCost:3, level:'mid',      color:'#69ff47', key:'2', x: base - 1*(BATTERY_W+gap), y: groundY - BATTERY_H },
    { name:'חץ 2',      range:1.0,  reloadTime:4,    currentReload:0, energyCost:5, level:'high',     color:'#ff9100', key:'3', x: base - 2*(BATTERY_W+gap), y: groundY - BATTERY_H },
    { name:'חץ 3',      range:1.0,  reloadTime:6,    currentReload:0, energyCost:8, level:'ballistic',color:'#e040fb', key:'4', x: base - 3*(BATTERY_W+gap), y: groundY - BATTERY_H },
  ];
}

// ── Cities ───────────────────────────────────────────────────────────────────
function makeCities(W, H) {
  const groundY = H - GROUND_H;
  const names = ['תל אביב', 'ירושלים', 'חיפה'];
  const cityW = 160;
  const cityGap = 80;
  const total = names.length * cityW + (names.length - 1) * cityGap;
  const startX = (W - total) / 2;
  return names.map((name, i) => ({
    name, hp: 3, maxHp: 3, flashTimer: 0,
    x: startX + i * (cityW + cityGap),
    y: groundY,
    w: cityW,
  }));
}

function init() {
  state.systems = makeSystems(canvas.width, canvas.height);
  state.cities  = makeCities(canvas.width, canvas.height);
}

// ── Stars (pre-generated) ─────────────────────────────────────────────────────
let stars = [];
function genStars(W, H) {
  stars = [];
  const skyH = H - GROUND_H;
  for (let i = 0; i < 260; i++) {
    const sx = (i * 7919 + 1337) % W;
    const sy = (i * 6271 + 421)  % (skyH * 0.85);
    const br = 0.3 + ((i * 3571) % 100) / 140;
    const r  = i % 5 === 0 ? 1.6 : i % 3 === 0 ? 1.1 : 0.65;
    stars.push({ x: sx, y: sy, r, br });
  }
}

// ── Render — Sky ─────────────────────────────────────────────────────────────
function drawSky() {
  const { width: W, height: H } = canvas;
  const skyH = H - GROUND_H;

  // Deep space → twilight horizon
  const g = ctx.createLinearGradient(0, 0, 0, skyH);
  g.addColorStop(0,    '#00020f');
  g.addColorStop(0.25, '#020818');
  g.addColorStop(0.6,  '#071530');
  g.addColorStop(0.85, '#0d2050');
  g.addColorStop(1,    '#152d6e');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, skyH);

  // Amber horizon atmospheric glow
  const hg = ctx.createLinearGradient(0, skyH - 120, 0, skyH);
  hg.addColorStop(0,   'rgba(255,120,20,0)');
  hg.addColorStop(0.6, 'rgba(255,100,10,0.06)');
  hg.addColorStop(1,   'rgba(255,80,0,0.18)');
  ctx.fillStyle = hg;
  ctx.fillRect(0, skyH - 120, W, 120);
}

function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.br})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMoon(W) {
  const mx = W * 0.15;
  const my = canvas.height * 0.12;
  const mr = 28;

  // Outer glow
  const glow = ctx.createRadialGradient(mx, my, mr * 0.8, mx, my, mr * 3.5);
  glow.addColorStop(0,   'rgba(200,220,255,0.18)');
  glow.addColorStop(0.4, 'rgba(180,210,255,0.07)');
  glow.addColorStop(1,   'rgba(180,210,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(mx, my, mr * 3.5, 0, Math.PI * 2);
  ctx.fill();

  // Moon body
  const moonGrad = ctx.createRadialGradient(mx - 7, my - 8, 2, mx, my, mr);
  moonGrad.addColorStop(0,   '#e8eeff');
  moonGrad.addColorStop(0.6, '#c8d8f0');
  moonGrad.addColorStop(1,   '#8a9ec0');
  ctx.fillStyle = moonGrad;
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();

  // Moon craters
  ctx.fillStyle = 'rgba(100,120,160,0.35)';
  [[mx+8, my+6, 5], [mx-6, my-4, 3.5], [mx+2, my-10, 2.5], [mx-10, my+10, 4]].forEach(([cx, cy, cr]) => {
    ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fill();
  });
}

// ── Render — Zones ───────────────────────────────────────────────────────────
function drawZones(W, H) {
  const skyH = H - GROUND_H;
  [
    { frac: 0.33, label: 'גובה נמוך',    color: '#00e5ff' },
    { frac: 0.66, label: 'גובה בינוני',  color: '#69ff47' },
    { frac: 0.88, label: 'גובה בליסטי',  color: '#e040fb' },
  ].forEach(z => {
    const y = skyH * (1 - z.frac);
    ctx.save();
    ctx.strokeStyle = z.color + '40';
    ctx.lineWidth   = 1;
    ctx.setLineDash([6, 14]);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = z.color + '70';
    ctx.font = '11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(z.label, 10, y - 4);
    ctx.restore();
  });
}

// ── Render — Ground ───────────────────────────────────────────────────────────
function drawGround(W, H) {
  const gy = H - GROUND_H;

  // Main fill
  const g = ctx.createLinearGradient(0, gy, 0, H);
  g.addColorStop(0,    '#253d14');
  g.addColorStop(0.35, '#192c0d');
  g.addColorStop(1,    '#0a1507');
  ctx.fillStyle = g;
  ctx.fillRect(0, gy, W, GROUND_H);

  // Road/terrain stripes
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  for (let xi = 0; xi < W; xi += 120) {
    ctx.fillRect(xi, gy + 18, 60, 6);
  }

  // Top border glow
  ctx.strokeStyle = '#3d6e1e';
  ctx.lineWidth   = 2.5;
  ctx.shadowColor = '#5a9e2e';
  ctx.shadowBlur  = 8;
  ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  ctx.shadowBlur  = 0;
}

// ── Render — City ─────────────────────────────────────────────────────────────
function drawCity(city) {
  const { x, y, w, hp, maxHp, name, flashTimer } = city;
  const flash = flashTimer > 0;
  const dmg   = hp / maxHp;

  // Building layout — varied heights
  const bldgs = [
    { ox: 0,   bw: 28, bh: 68 },
    { ox: 30,  bw: 22, bh: 48 },
    { ox: 54,  bw: 36, bh: 82 },  // tallest — center
    { ox: 92,  bw: 20, bh: 55 },
    { ox: 114, bw: 30, bh: 70 },
    { ox: 146, bw: 14, bh: 38 },
  ];

  bldgs.forEach((b, bi) => {
    const bx = x + b.ox;
    const by = y - b.bh;

    // Body gradient
    const bg = ctx.createLinearGradient(bx, by, bx + b.bw, by + b.bh);
    if (flash) {
      bg.addColorStop(0, '#ff2200'); bg.addColorStop(1, '#6a0000');
    } else if (dmg > 0.66) {
      bg.addColorStop(0, bi === 2 ? '#3a6ab8' : '#2e5590');
      bg.addColorStop(1, '#0e1f40');
    } else if (dmg > 0.33) {
      bg.addColorStop(0, '#7a5a20'); bg.addColorStop(1, '#2a1a05');
    } else {
      bg.addColorStop(0, '#5a2a0a'); bg.addColorStop(1, '#1a0800');
    }
    ctx.fillStyle = bg;
    ctx.fillRect(bx, by, b.bw, b.bh);

    // Outline
    ctx.strokeStyle = flash ? '#ff5500' : 'rgba(80,140,220,0.35)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx, by, b.bw, b.bh);

    // Rooftop accent
    if (!flash) {
      ctx.fillStyle = dmg > 0.66 ? 'rgba(80,160,255,0.4)' : 'rgba(120,80,20,0.4)';
      ctx.fillRect(bx, by, b.bw, 3);
    }

    // Antenna on tallest
    if (bi === 2 && !flash) {
      ctx.strokeStyle = '#6090d0';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx + b.bw / 2, by);
      ctx.lineTo(bx + b.bw / 2, by - 14);
      ctx.stroke();
      ctx.fillStyle = '#ff3040';
      ctx.beginPath(); ctx.arc(bx + b.bw/2, by - 16, 2.5, 0, Math.PI*2); ctx.fill();
    }

    // Windows
    drawWindows(bx + 3, by + 6, b.bw - 6, b.bh - 10, flash, bi);
  });

  // City name
  ctx.fillStyle = flash ? '#ff8800' : 'rgba(180,210,255,0.9)';
  ctx.font      = 'bold 13px Arial Hebrew, Arial';
  ctx.textAlign = 'center';
  ctx.fillText(name, x + w / 2, y + 18);

  // HP hearts
  drawCityHP(x + w / 2, y + 34, hp, maxHp, flash);
}

function drawWindows(bx, by, bw, bh, flash, seed) {
  const cols = Math.max(2, Math.floor(bw / 9));
  const rows = Math.max(2, Math.floor(bh / 11));
  const ww = 5, wh = 6;
  const px = (bw - cols * ww) / (cols + 1);
  const py = (bh - rows * wh) / (rows + 1);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const wx = bx + px + c * (ww + px);
      const wy = by + py + r * (wh + py);
      const lit = ((r * 17 + c * 11 + seed * 3) % 7) !== 0;
      if (flash) {
        ctx.fillStyle = 'rgba(255,80,0,0.9)';
      } else {
        ctx.fillStyle = lit ? 'rgba(255,235,140,0.88)' : 'rgba(10,20,40,0.8)';
      }
      ctx.fillRect(wx, wy, ww, wh);
    }
  }
}

function drawCityHP(cx, cy, hp, maxHp, flash) {
  const sz = 12, sp = 17;
  const total = maxHp * sp - (sp - sz);
  let sx = cx - total / 2;
  for (let i = 0; i < maxHp; i++) {
    drawHeart(sx + i * sp, cy, sz, i < hp ? (flash ? '#ff6600' : '#ff1744') : '#2a2a3a');
  }
}

function drawHeart(x, y, sz, color) {
  const s = sz / 2;
  ctx.fillStyle = color;
  if (color !== '#2a2a3a') {
    ctx.shadowColor = color;
    ctx.shadowBlur  = 6;
  }
  ctx.beginPath();
  ctx.moveTo(x + s, y + s * 0.4);
  ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.4);
  ctx.bezierCurveTo(x, y + s * 1.1, x + s, y + s * 1.6, x + s, y + s * 1.8);
  ctx.bezierCurveTo(x + s, y + s * 1.6, x + sz, y + s * 1.1, x + sz, y + s * 0.4);
  ctx.bezierCurveTo(x + sz, y, x + s, y, x + s, y + s * 0.4);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ── Render — Battery ──────────────────────────────────────────────────────────
function drawSystem(sys, isSel) {
  const { x, y, name, color, key } = sys;
  const bw = BATTERY_W, bh = BATTERY_H;
  const cx = x + bw / 2;

  ctx.save();
  if (isSel) { ctx.shadowColor = color; ctx.shadowBlur = 22; }

  // Ground pad
  const padGrad = ctx.createLinearGradient(x, y + bh * 0.5, x, y + bh);
  padGrad.addColorStop(0, isSel ? '#1e2e1e' : '#111811');
  padGrad.addColorStop(1, '#060a06');
  ctx.fillStyle   = padGrad;
  ctx.strokeStyle = isSel ? color + 'cc' : '#2a3a2a';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.roundRect(x + 4, y + bh * 0.48, bw - 8, bh * 0.52, [3, 3, 0, 0]);
  ctx.fill(); ctx.stroke();

  // Vertical mast
  ctx.strokeStyle = isSel ? color + 'aa' : '#334433';
  ctx.lineWidth   = 3;
  ctx.beginPath();
  ctx.moveTo(cx, y + bh * 0.48);
  ctx.lineTo(cx, y + bh * 0.15);
  ctx.stroke();

  // Rotating arm pivot → launcher tube
  const armAngle = -Math.PI * 0.42;
  const armLen   = bh * 0.72;
  const tx = cx + Math.cos(armAngle) * armLen;
  const ty = (y + bh * 0.28) + Math.sin(armAngle) * armLen;

  // Arm
  ctx.strokeStyle = isSel ? color : '#445544';
  ctx.lineWidth   = 6;
  ctx.lineCap     = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, y + bh * 0.28);
  ctx.lineTo(tx, ty);
  ctx.stroke();

  // Launcher tube (thinner line on top)
  ctx.strokeStyle = isSel ? '#fff' : '#889988';
  ctx.lineWidth   = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx, y + bh * 0.28);
  ctx.lineTo(tx, ty);
  ctx.stroke();

  // Muzzle flash circle
  ctx.fillStyle   = isSel ? color : '#334';
  ctx.shadowBlur  = isSel ? 12 : 0;
  ctx.shadowColor = color;
  ctx.beginPath(); ctx.arc(tx, ty, isSel ? 5 : 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // Radar dish
  const rx = x + bw * 0.82, ry = y + bh * 0.42;
  ctx.strokeStyle = isSel ? color + 'cc' : '#445544';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.arc(rx, ry, 9, Math.PI * 0.9, Math.PI * 2.1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(rx, ry);
  ctx.lineTo(rx, ry + 10);
  ctx.stroke();
  // Dish center dot
  ctx.fillStyle = isSel ? color : '#445';
  ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI * 2); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // Key badge
  const badgeY = y + bh + 16;
  if (isSel) {
    ctx.fillStyle   = color + '30';
    ctx.strokeStyle = color + 'aa';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.roundRect(x + 4, y + bh + 4, bw - 8, 26, 4);
    ctx.fill(); ctx.stroke();
  }

  ctx.fillStyle = isSel ? color : '#667766';
  ctx.font      = `bold 12px Arial`;
  ctx.textAlign = 'center';
  ctx.fillText(`[${key}]`, cx, badgeY);

  ctx.fillStyle = isSel ? '#fff' : '#889988';
  ctx.font      = `bold 11px Arial Hebrew, Arial`;
  ctx.fillText(name, cx, badgeY + 13);
}

function drawReloadBars() {
  state.systems.forEach((sys, i) => {
    const isSel = i === state.selectedSystem;
    const by = sys.y + BATTERY_H + 36;
    const bw = BATTERY_W - 8;
    const bx = sys.x + 4;
    const bh = 5;

    // Track
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 2); ctx.fill();

    // Fill
    const prog = 1 - (sys.currentReload / sys.reloadTime);
    if (prog > 0) {
      const fg = ctx.createLinearGradient(bx, 0, bx + bw, 0);
      fg.addColorStop(0,   sys.color + (isSel ? 'ff' : '99'));
      fg.addColorStop(1,   sys.color + (isSel ? 'cc' : '55'));
      ctx.fillStyle = fg;
      if (isSel) { ctx.shadowColor = sys.color; ctx.shadowBlur = 5; }
      ctx.beginPath(); ctx.roundRect(bx, by, bw * prog, bh, 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Border
    ctx.strokeStyle = isSel ? sys.color + '88' : '#334433';
    ctx.lineWidth   = 1;
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 2); ctx.stroke();
  });
}

// ── Render — HUD ──────────────────────────────────────────────────────────────
function drawPanel(x, y, w, h, fill, stroke, radius = 8) {
  ctx.save();
  ctx.fillStyle   = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth   = 1.5;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, radius); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawTopHUD(W) {
  const pad = 14;

  // ── Left: Wave + Score
  const lw = 170, lh = 60;
  drawPanel(pad, pad, lw, lh, 'rgba(0,5,20,0.88)', 'rgba(0,100,200,0.6)');

  ctx.font      = '11px Arial Hebrew, Arial';
  ctx.fillStyle = '#5599cc';
  ctx.textAlign = 'right';
  ctx.fillText('גל', pad + lw - pad, pad + 20);
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 20px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(state.wave, pad + lw - pad + 5, pad + 22);

  ctx.font      = '11px Arial Hebrew, Arial';
  ctx.fillStyle = '#5599cc';
  ctx.textAlign = 'right';
  ctx.fillText('ניקוד', pad + lw - pad, pad + 44);
  ctx.fillStyle = '#ffd700';
  ctx.font      = 'bold 16px Arial';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#ffa000'; ctx.shadowBlur = 8;
  ctx.fillText(String(state.score).padStart(6, '0'), pad + lw - pad + 5, pad + 46);
  ctx.shadowBlur = 0;

  // ── Right: Energy
  const rw = 200, rh = 60;
  const rx = W - rw - pad;
  drawPanel(rx, pad, rw, rh, 'rgba(0,5,20,0.88)', 'rgba(0,100,200,0.6)');

  ctx.font      = '11px Arial Hebrew, Arial';
  ctx.fillStyle = '#5599cc';
  ctx.textAlign = 'right';
  ctx.fillText(`אנרגיה  ${state.energy} / ${state.maxEnergy}`, rx + rw - pad, pad + 20);

  // Bar
  const bx = rx + pad, by = pad + 28, bw2 = rw - pad * 2, bh2 = 16;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw2, bh2, 4); ctx.fill();

  const ratio = state.energy / state.maxEnergy;
  const barColor = ratio > 0.5
    ? `hsl(${180 + 40 * ratio}, 90%, 55%)`
    : ratio > 0.25
      ? `hsl(40, 90%, 55%)`
      : `hsl(0, 90%, 55%)`;

  ctx.shadowColor = barColor; ctx.shadowBlur = 8;
  const eg = ctx.createLinearGradient(bx, 0, bx + bw2, 0);
  eg.addColorStop(0,   barColor);
  eg.addColorStop(1,   barColor + 'bb');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.roundRect(bx + 2, by + 2, (bw2 - 4) * ratio, bh2 - 4, 3); ctx.fill();
  ctx.shadowBlur = 0;

  // Tick marks
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth   = 1;
  const seg = (bw2 - 4) / state.maxEnergy;
  for (let i = 1; i < state.maxEnergy; i++) {
    const tx2 = bx + 2 + i * seg;
    ctx.beginPath(); ctx.moveTo(tx2, by + 3); ctx.lineTo(tx2, by + bh2 - 3); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,150,220,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(bx, by, bw2, bh2, 4); ctx.stroke();
}

function drawSelectedIndicator(W, H) {
  const sys  = state.systems[state.selectedSystem];
  if (!sys) return;
  const text = `⬛ מערכת פעילה: ${sys.name}   |   עלות: ${sys.energyCost} ⚡   |   טעינה: ${sys.reloadTime}s`;
  const pw = 420, ph = 30;
  const px = (W - pw) / 2;
  const py = H - GROUND_H - ph - 6;

  ctx.save();
  ctx.shadowColor = sys.color; ctx.shadowBlur = 12;
  drawPanel(px, py, pw, ph, 'rgba(0,4,14,0.85)', sys.color + '77', 6);
  ctx.shadowBlur = 0;

  ctx.fillStyle   = sys.color;
  ctx.font        = 'bold 13px Arial Hebrew, Arial';
  ctx.textAlign   = 'center';
  ctx.fillText(text, W / 2, py + 20);
  ctx.restore();
}

// ── Scanlines overlay (subtle arcade feel) ────────────────────────────────────
function drawScanlines(W, H) {
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  for (let y = 0; y < H; y += 3) {
    ctx.fillRect(0, y, W, 1);
  }
}

// ── Main Render ───────────────────────────────────────────────────────────────
function render() {
  const { width: W, height: H } = canvas;

  drawSky();
  drawMoon(W);
  drawStars();
  drawZones(W, H);
  drawGround(W, H);
  state.cities.forEach(c => drawCity(c));
  state.systems.forEach((sys, i) => drawSystem(sys, i === state.selectedSystem));
  drawReloadBars();
  drawTopHUD(W);
  drawSelectedIndicator(W, H);
  drawScanlines(W, H);
}

// ── Input ─────────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  const idx = parseInt(e.key) - 1;
  if (idx >= 0 && idx <= 3) { state.selectedSystem = idx; render(); }
});

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
genStars(canvas.width, canvas.height);
render();
</script>
</body>
</html>
